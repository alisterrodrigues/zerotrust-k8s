name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build, Vet, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Install envtest and run tests
        # make test handles: manifests generation, code generation, fmt, vet,
        # envtest binary download, and test execution with KUBEBUILDER_ASSETS set.
        run: make test

      - name: Test with race detector
        # Re-run the controller tests with -race to catch data races.
        # KUBEBUILDER_ASSETS is already cached from the previous step.
        run: |
          ASSETS="$(./bin/setup-envtest use --bin-dir ./bin -p path 2>/dev/null || \
                   ./bin/setup-envtest* use --bin-dir ./bin -p path 2>/dev/null)"
          KUBEBUILDER_ASSETS="$ASSETS" \
            go test -race ./internal/controller/... -v -timeout 120s -count=1
