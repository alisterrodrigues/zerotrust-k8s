name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build, Vet, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Install envtest and run tests
        # make test handles: manifests generation, code generation, fmt, vet,
        # envtest binary download, and test execution with KUBEBUILDER_ASSETS set.
        run: make test

      - name: Test with race detector
        # getFirstFoundEnvTestBinaryDir() in suite_test.go finds the envtest binaries
        # already downloaded by make test into ./bin/k8s/ — no KUBEBUILDER_ASSETS needed.
        run: go test -race ./internal/controller/... -v -timeout 120s -count=1
