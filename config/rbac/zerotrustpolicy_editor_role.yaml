# This rule is not used by the project zerotrust-k8s itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the zerotrust.capstone.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: zerotrust-k8s
    app.kubernetes.io/managed-by: kustomize
  name: zerotrustpolicy-editor-role
rules:
- apiGroups:
  - zerotrust.capstone.io
  resources:
  - zerotrustpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - zerotrust.capstone.io
  resources:
  - zerotrustpolicies/status
  verbs:
  - get
