# Example Zero Trust baseline (see docs/architecture.md).
apiVersion: zerotrust.capstone.io/v1alpha1
kind: ZeroTrustPolicy
metadata:
  labels:
    app.kubernetes.io/name: zerotrust-k8s
    app.kubernetes.io/managed-by: kustomize
  name: cluster-baseline
spec:
  rbac:
    denyWildcardVerbs: true        # Enables RBAC-001 (ClusterRole) and RBAC-004 (Role) detection
    denyWildcardResources: true    # Enables RBAC-002 (ClusterRole) and RBAC-005 (Role) detection
    denyClusterAdminBinding:       # Enables RBAC-003 detection
      excludeServiceAccounts:
        - system:masters
        - kube-system/*
    requireNamespacedRoles: true   # Enables RBAC-006 detection
  networkPolicy:
    requireDefaultDenyIngress: true  # Enables NP-001 detection
    requireDefaultDenyEgress: false  # Set true to enable NP-002 detection
    exemptNamespaces:
      - kube-system
      - kube-public        # system namespace for bootstrap ConfigMaps; no workloads
      - kube-node-lease   # system namespace for node heartbeat leases; no workloads
      - monitoring
      - test-exempt
      - zerotrust-system  # controller's own namespace (make run path)
      - zerotrust-k8s-system  # controller's own namespace (make deploy path)
  remediation:
    mode: auto
    rateLimit: 5   # Max auto-remediations per 30-second window
    requireApprovalFor:
      - ClusterAdminBinding
